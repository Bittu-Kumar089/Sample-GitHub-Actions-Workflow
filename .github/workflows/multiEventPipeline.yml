name: "Multi event pipeline / workflow"  # Name of the pipeline

on:
  push:   # Trigger on push to master or test
    branches:
      - master
      - test

  pull_request:  # Trigger on PR to master
    branches:
      - master
  workflow_dispatch: 

jobs:
  on-push:   # Job 1
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: "Running on master/test push"
        run: echo "Running on master/test push"

  on-pull-request:   # Job 2
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: "Running on pull request"
        run: echo "Running on pull request"
        